name: Deploy Ecommerce App to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials (IAM login)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3️⃣ Verify AWS login
    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    # 4️⃣ Setup SSH
    - name: Setup SSH Key
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem

    # 5️⃣ Prepare EC2 server
    - name: Prepare EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
        sudo apt update -y

        # Install Node.js
        if ! command -v node > /dev/null
        then
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs
        fi

        # Install Nginx
        if ! command -v nginx > /dev/null
        then
          sudo apt install -y nginx
          sudo systemctl enable nginx
        fi

        # Install PM2
        sudo npm install -g pm2

        # Prepare app directory
        sudo rm -rf /home/ubuntu/app
        mkdir -p /home/ubuntu/app
        EOF

    # 6️⃣ Copy project files to EC2
    - name: Copy Files to EC2
      run: |
        scp -o StrictHostKeyChecking=no -i key.pem -r . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/app

    # 7️⃣ Install dependencies, create .env, start app, configure Nginx
    - name: Start App
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
        cd /home/ubuntu/app

        # Install dependencies
        npm install

        # Create .env from GitHub Secrets
        echo "PORT=3000" > .env
        echo "SITE_NAME=${{ secrets.SITE_NAME }}" >> .env

        mkdir -p logs

        # Start app with PM2
        pm2 delete ecommerce-app || true
        pm2 start ecosystem.config.js --env production
        pm2 save

        # Configure Nginx to proxy to Node.js
        sudo bash -c 'cat > /etc/nginx/sites-available/default << EOL
server {
    listen 80;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
        proxy_cache_bypass \$http_upgrade;
    }
}
EOL'

        sudo systemctl restart nginx
        EOF
